<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#004ee8" />
  <meta name="description" content="48H Project — Mobile-first productivity app. Organise epics and tasks in a 48-hour sprint with a hard WIP limit." />
  <title>48H Project | Maximum Sprint Duration</title>
  
  <link rel="manifest" href="/manifest.json">
  <link rel="icon" type="image/svg+xml" href="/icon.svg">
  <link rel="apple-touch-icon" href="/icon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    /* ============================================================
       48H PROJECT — Kinetic Blueprint Design System
       ============================================================ */
    :root {
      --bg:          #131313;
      --surface:     #1f1f1f;
      --surface-hi:  #2a2a2a;
      --surface-top: #353535;
      --text:        #e2e2e2;
      --text-dim:    #c6c6c6;
      --outline:     #919191;
      --outline-dim: #474747;
      --blue:        #004ee8;
      --blue-dim:    #003ab3;
      --red:         #c00000;
      --red-dim:     #93000a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }
    button { cursor: pointer; border: none; background: none; font-family: inherit; color: inherit; }
    input, textarea, select { font-family: inherit; color: inherit; }

    /* WIP Flash */
    body.wip-flash { animation: wip-flash-anim 0.6s linear; }
    @keyframes wip-flash-anim {
      0%   { background-color: var(--bg); }
      15%  { background-color: var(--red-dim); }
      60%  { background-color: var(--red-dim); }
      100% { background-color: var(--bg); }
    }

    /* App Shell */
    .app-root {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 430px;
      margin: 0 auto;
      position: relative;
    }
    .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: 5rem; }

    /* Status Ticker */
    .status-ticker {
      background: var(--surface-top);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.5rem 1rem;
      border-bottom: 1px solid var(--outline-dim);
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .ticker-label { font-size: 0.625rem; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; }
    .ticker-wip { font-size: 0.625rem; font-weight: 700; letter-spacing: 0.1em; color: var(--text-dim); display: flex; align-items: center; gap: 0.4rem; }
    .ticker-wip.full { color: var(--red); }
    .ticker-full-badge { background: var(--red); color: #fff; font-size: 0.5rem; font-weight: 800; letter-spacing: 0.1em; padding: 0.1rem 0.35rem; }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      display: flex;
      background: var(--surface);
      border-top: 1px solid var(--outline-dim);
      z-index: 20;
    }
    .nav-tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 0.5rem;
      gap: 0.25rem;
      color: var(--text-dim);
      min-height: 64px;
      border-radius: 0;
      border-top: 2px solid transparent;
      transition: color 0.15s linear, background-color 0.15s linear;
    }
    .nav-tab.active { color: var(--text); background-color: var(--surface-hi); border-top-color: var(--text); }
    .nav-icon { width: 22px; height: 22px; }
    .nav-label { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; }

    /* View Layout */
    .view { padding: 1.25rem 1rem; min-height: 100%; position: relative; }
    .view-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--outline-dim);
      padding-bottom: 0.75rem;
    }
    .view-title { font-size: 1.75rem; font-weight: 800; letter-spacing: -0.03em; color: var(--text); line-height: 1; }
    .view-count { font-size: 0.6rem; font-weight: 600; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; }

    /* Empty State */
    .empty-state { text-align: center; padding: 3rem 1.5rem; }
    .empty-state__title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 0.5rem; }
    .empty-state__sub { font-size: 0.75rem; line-height: 1.6; color: var(--outline); }

    /* FAB */
    .fab {
      position: fixed;
      bottom: 5rem;
      right: max(1rem, calc(50% - 205px));
      width: 52px;
      height: 52px;
      background: var(--blue);
      color: #fff;
      font-size: 1.5rem;
      font-weight: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      z-index: 15;
      transition: background 0.15s linear;
    }
    .fab:hover { background: var(--blue-dim); }

    /* Epic List */
    .epic-list { display: flex; flex-direction: column; gap: 1px; background: var(--outline-dim); border: 1px solid var(--outline-dim); }
    .epic-card {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1rem 0.9rem 0.6rem;
      background: var(--surface);
      transition: background 0.1s linear;
      min-height: 60px;
      cursor: pointer;
      text-align: left;
      border-left: 14px solid transparent;
    }
    .epic-card:hover { background: var(--surface-hi); }
    .epic-card__content { flex: 1; display: flex; flex-direction: column; gap: 0.15rem; }
    .epic-card__name { font-size: 0.95rem; font-weight: 600; color: var(--text); letter-spacing: -0.01em; }
    .epic-card__meta { font-size: 0.55rem; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); }
    .epic-card__badge { display: flex; flex-direction: column; align-items: center; pointer-events: none; }
    .epic-badge { font-size: 1.1rem; font-weight: 800; color: var(--text); line-height: 1; }
    .epic-badge-label { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.08em; color: var(--text-dim); text-transform: uppercase; }

    /* Kanban */
    .kanban-board {
      display: flex;
      gap: 1px;
      overflow-x: auto;
      background: var(--outline-dim);
      border: 1px solid var(--outline-dim);
      min-height: calc(100dvh - 16rem);
      -webkit-overflow-scrolling: touch;
    }
    .kanban-col { flex: 0 0 78vw; max-width: 300px; min-width: 240px; background: var(--bg); display: flex; flex-direction: column; }
    .kanban-col.is-full { background: #130a0a; }
    .kanban-col__header {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.65rem 0.85rem;
      background: var(--surface);
      border-bottom: 1px solid var(--outline-dim);
    }
    .kanban-col__label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); flex: 1; }
    .kanban-col__count { font-size: 0.7rem; font-weight: 800; color: var(--text); font-variant-numeric: tabular-nums; }
    .kanban-full-badge { font-size: 0.5rem; font-weight: 800; letter-spacing: 0.1em; color: var(--red); border: 1px solid var(--red); padding: 0.1rem 0.3rem; }
    .kanban-empty { padding: 1.5rem 0.85rem; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; color: var(--outline-dim); }
    .task-list { display: flex; flex-direction: column; gap: 1px; background: var(--outline-dim); flex: 1; }

    /* Task Card */
    .task-card { background: var(--surface); padding: 0.85rem 0.85rem 0.85rem 0.6rem; display: flex; flex-direction: column; gap: 0.4rem; cursor: pointer; text-align: left; border-left: 14px solid transparent; }
    .task-card.done { background: var(--surface-top); opacity: 0.7; }
    .task-card.wip { background: #ffffff; color: #131313; }
    .task-card:hover:not(.done):not(.wip) { background: var(--surface-hi); }
    .task-card.wip:hover { background: #f4f4f4; }
    .task-card__header { display: flex; align-items: center; gap: 0.4rem; pointer-events: none; }
    .task-epic-name { font-size: 0.55rem; font-weight: 600; letter-spacing: 0.08em; color: var(--text-dim); flex: 1; text-transform: uppercase; }
    .task-status-pill { font-size: 0.5rem; font-weight: 700; letter-spacing: 0.1em; padding: 0.15rem 0.4rem; border: 1px solid currentColor; }
    .pill-to-be-picked { color: var(--text-dim); }
    .pill-wip { color: var(--blue); }
    .pill-done { color: var(--outline); }
    .task-title { font-size: 0.875rem; font-weight: 600; color: var(--text); line-height: 1.4; letter-spacing: -0.01em; }
    .task-title.done { text-decoration: line-through; color: var(--text-dim); }
    .task-card.wip .task-title { color: #131313; }
    .task-dod { font-size: 0.7rem; color: var(--text-dim); line-height: 1.5; }
    .task-card.wip .task-dod { color: #474747; }
    .task-dod-label { font-weight: 700; font-size: 0.6rem; letter-spacing: 0.08em; color: var(--outline); }
    .task-card.wip .task-dod-label { color: #737373; }
    .task-date { font-size: 0.55rem; font-weight: 600; letter-spacing: 0.08em; color: var(--outline); text-transform: uppercase; font-variant-numeric: tabular-nums; }
    .task-card.wip .task-date { color: #737373; }
    .task-advance-btn {
      align-self: flex-start;
      margin-top: 0.4rem;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      color: var(--blue);
      padding: 0.35rem 0.6rem;
      border: 1px solid var(--blue);
      transition: background 0.1s linear, color 0.1s linear;
      min-height: 32px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .task-advance-btn:hover { background: var(--blue); color: #fff; }

    /* WIP Blocker */
    .wip-blocker {
      position: fixed;
      inset: 0;
      background: var(--red-dim);
      z-index: 999;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: wip-blocker-out 0.6s linear forwards;
    }
    @keyframes wip-blocker-out { 0% { opacity:1; } 70% { opacity:1; } 100% { opacity:0; pointer-events:none; } }
    .wip-blocker__inner { text-align: center; padding: 2rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .wip-blocker__title { font-size: 3.5rem; font-weight: 800; letter-spacing: -0.04em; color: #fff; line-height: 1; }
    .wip-blocker__subtitle { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.15em; color: #ffb4ab; }
    .wip-blocker__rule { font-size: 0.6rem; font-weight: 500; letter-spacing: 0.08em; color: #ffb4ab; opacity: 0.7; }

    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 100;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-sheet {
      background: var(--surface);
      width: 100%;
      max-width: 430px;
      border-top: 2px solid var(--outline-dim);
      padding: 1.25rem 1.25rem 2.5rem;
      max-height: 90dvh;
      overflow-y: auto;
      animation: sheet-up 0.2s linear;
    }
    @keyframes sheet-up { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 0.35rem; }
    .modal-tag { font-size: 0.65rem; font-weight: 800; letter-spacing: 0.15em; color: var(--text); border: 1px solid var(--outline-dim); padding: 0.2rem 0.5rem; }
    .modal-close { font-size: 1rem; color: var(--text-dim); width: 44px; height: 44px; display: flex; align-items: center; justify-content: center; }
    .modal-subtitle { font-size: 0.7rem; color: var(--outline); margin-bottom: 1.25rem; line-height: 1.5; }
    .modal-form { display: flex; flex-direction: column; }
    .field-label { font-size: 0.6rem; font-weight: 700; letter-spacing: 0.12em; color: var(--text-dim); margin-bottom: 0.4rem; display: block; }
    .field-mt { margin-top: 1.25rem; }
    .field-input {
      background: var(--surface-hi);
      border: none;
      border-bottom: 1px solid var(--outline-dim);
      color: var(--text);
      padding: 0.75rem;
      font-size: 0.9rem;
      width: 100%;
      outline: none;
      border-radius: 0;
      transition: border-color 0.15s linear;
    }
    .field-input:focus { border-bottom: 2px solid var(--blue); }
    .field-input.error { border-bottom: 2px solid var(--red); }
    textarea.field-input { resize: vertical; min-height: 5rem; }
    select.field-input { appearance: none; cursor: pointer; }
    .field-error { font-size: 0.65rem; color: var(--red); font-weight: 600; letter-spacing: 0.05em; margin-top: 0.25rem; }
    .color-swatches { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-bottom: 0.25rem; }
    .swatch { width: 36px; height: 36px; border-radius: 50%; border: 2px solid transparent; flex-shrink: 0; transition: transform 0.1s linear; cursor: pointer; }
    .swatch.selected { border-color: var(--text); transform: scale(1.15); }
    .btn-primary {
      margin-top: 1.75rem;
      background: var(--blue);
      color: #fff;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 0.9rem 1.3rem;
      width: 100%;
      border-radius: 0;
      transition: background 0.1s linear;
      min-height: 48px;
    }
    .btn-primary:hover:not(:disabled) { background: var(--blue-dim); }
    .btn-primary:disabled { background: var(--surface-top); color: var(--outline); cursor: not-allowed; }
    .btn-danger {
      margin-top: 0.5rem;
      background: transparent;
      color: var(--red);
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 0.9rem 1.3rem;
      width: 100%;
      border-radius: 0;
      transition: background 0.1s linear;
      min-height: 48px;
    }
    .btn-danger:hover { background: var(--red-dim); color: #fff; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--outline-dim); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React 18 + Babel (JSX) via CDN -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "react":     "https://esm.sh/react@18",
        "react-dom": "https://esm.sh/react-dom@18",
        "react-dom/client": "https://esm.sh/react-dom@18/client"
      }
    }
  </script>

  <script type="text/babel" data-type="module">
    import React, { useState, useEffect, useCallback } from 'react';
    import { createRoot } from 'react-dom/client';

    /* ============================================================
       CONSTANTS
       ============================================================ */
    const EPIC_COLORS = [
      '#004ee8', '#c00000', '#e8a200', '#00a87a',
      '#8b00e8', '#e85c00', '#0095e8', '#e800a2',
    ];
    const WIP_LIMIT = 2;

    /* ============================================================
       STORE UTILITIES
       ============================================================ */
    class WipLimitError extends Error {
      constructor() { super('WIP_LIMIT_EXCEEDED'); }
    }

    const getWipCount = (tasks) => tasks.filter(t => t.status === 'WIP').length;
    const canMoveToWip = (tasks) => getWipCount(tasks) < WIP_LIMIT;

    const createEpic = (name, colorHex) => ({
      id: crypto.randomUUID(), name: name.trim(), colorHex,
    });

    const createTask = (epicId, title, definitionOfDone) => ({
      id: crypto.randomUUID(),
      epicId,
      title: title.trim(),
      definitionOfDone: definitionOfDone.trim(),
      status: 'TO_BE_PICKED',
      dateStarted: null,
    });

    const moveTaskStatus = (tasks, taskId, newStatus) => {
      if (newStatus === 'WIP' && !canMoveToWip(tasks)) throw new WipLimitError();
      return tasks.map(t => t.id !== taskId ? t : {
        ...t,
        status: newStatus,
        dateStarted: newStatus === 'WIP' && !t.dateStarted
          ? new Date().toISOString() : t.dateStarted,
      });
    };

    /* ============================================================
       HOOK: useLocalStorage
       ============================================================ */
    function useLocalStorage(key, initial) {
      const [val, setVal] = useState(() => {
        try {
          const item = localStorage.getItem(key);
          return item ? JSON.parse(item) : initial;
        } catch { return initial; }
      });
      const set = useCallback((v) => {
        try {
          const stored = v instanceof Function ? v(val) : v;
          setVal(stored);
          localStorage.setItem(key, JSON.stringify(stored));
        } catch (e) { console.error(e); }
      }, [key, val]);
      return [val, set];
    }

    /* ============================================================
       STATUS TICKER (TOP BAR)
       ============================================================ */
    function StatusTicker({ tasks, isSyncing }) {
      const wipCount = tasks.filter(t => t.status === 'WIP').length;
      return (
        <header className="status-ticker">
          <div className="status-ticker__left">
            <span className="ticker-label">WIP LIMIT</span>
            <span className={`ticker-value${wipCount >= WIP_LIMIT ? ' critical' : ''}`}>{wipCount}/{WIP_LIMIT}</span>
          </div>
          <div className="status-ticker__right">
            {isSyncing ? (
              <span className="sync-status active">SYNCING...</span>
            ) : (
              <span className="sync-status">CLOUD SYNCED</span>
            )}
            <span className="ticker-time">48H</span>
          </div>
        </header>
      );
    }

    /* ============================================================
       BOTTOM NAV
       ============================================================ */
    function BottomNav({ active, onChange }) {
      return (
        <nav className="bottom-nav">
          <button
            id="nav-brain-dump"
            className={`nav-tab${active === 'brain-dump' ? ' active' : ''}`}
            onClick={() => onChange('brain-dump')}
          >
            <svg className="nav-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/>
            </svg>
            <span className="nav-label">Brain Dump</span>
          </button>
          <button
            id="nav-action-board"
            className={`nav-tab${active === 'action-board' ? ' active' : ''}`}
            onClick={() => onChange('action-board')}
          >
            <svg className="nav-icon" viewBox="0 0 24 24" fill="currentColor">
              <path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/>
            </svg>
            <span className="nav-label">Action Board</span>
          </button>
        </nav>
      );
    }

    /* ============================================================
       WIP BLOCKER
       ============================================================ */
    function WipBlocker({ visible }) {
      useEffect(() => {
        if (visible) {
          document.body.classList.add('wip-flash');
          const t = setTimeout(() => document.body.classList.remove('wip-flash'), 600);
          return () => clearTimeout(t);
        }
      }, [visible]);
      if (!visible) return null;
      return (
        <div className="wip-blocker" role="alert">
          <div className="wip-blocker__inner">
            <span className="wip-blocker__title">WIP FULL</span>
            <span className="wip-blocker__subtitle">MAX 2 ACTIVE TASKS ALLOWED</span>
            <span className="wip-blocker__rule">FINISH OR DEPRIORITIZE BEFORE ADDING MORE</span>
          </div>
        </div>
      );
    }

    /* ============================================================
       EPIC CARD
       ============================================================ */
    function EpicCard({ epic, taskCount, onClick }) {
      return (
        <div className="epic-card" role="button" tabIndex="0" id={`epic-${epic.id}`} onClick={() => onClick(epic)} style={{ borderLeftColor: epic.colorHex }}>
          <div className="epic-card__content">
            <span className="epic-card__name">{epic.name}</span>
            <span className="epic-card__meta">EPIC</span>
          </div>
          <div className="epic-card__badge">
            <span className="epic-badge">{taskCount}</span>
            <span className="epic-badge-label">tasks</span>
          </div>
        </div>
      );
    }

    /* ============================================================
       ADD/EDIT EPIC MODAL
       ============================================================ */
    function AddEpicModal({ editItem, onClose, onSave, onDelete }) {
      const [name, setName] = useState(editItem ? editItem.name : '');
      const [color, setColor] = useState(editItem ? editItem.colorHex : EPIC_COLORS[0]);
      const [err, setErr] = useState('');

      const submit = (e) => {
        e.preventDefault();
        if (!name.trim()) { setErr('Epic name is required.'); return; }
        onSave(name.trim(), color);
        onClose();
      };

      return (
        <div className="modal-overlay" onClick={onClose} id="add-epic-modal">
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-tag">{editItem ? 'EDIT EPIC' : 'NEW EPIC'}</span>
              <button className="modal-close" onClick={onClose} aria-label="Close">✕</button>
            </div>
            <p className="modal-subtitle">48H — Maximum Sprint Duration</p>
            <form onSubmit={submit} className="modal-form">
              <label className="field-label">EPIC NAME</label>
              <input
                autoFocus
                className={`field-input${err ? ' error' : ''}`}
                type="text"
                placeholder="e.g. Build MVP"
                value={name}
                id="epic-name-input"
                onChange={e => { setName(e.target.value); setErr(''); }}
              />
              {err && <span className="field-error">{err}</span>}

              <label className="field-label field-mt">COLOUR</label>
              <div className="color-swatches">
                {EPIC_COLORS.map(c => (
                  <button
                    key={c}
                    type="button"
                    className={`swatch${color === c ? ' selected' : ''}`}
                    style={{ backgroundColor: c }}
                    onClick={() => setColor(c)}
                    aria-label={`Color ${c}`}
                  />
                ))}
              </div>
              <button
                type="submit"
                className="btn-primary"
                disabled={!name.trim()}
                id="add-epic-submit"
              >
                {editItem ? 'SAVE CHANGES' : 'ADD EPIC'}
              </button>
              {editItem && (
                <button
                  type="button"
                  className="btn-danger"
                  onClick={onDelete}
                  id="delete-epic-submit"
                >
                  DELETE EPIC
                </button>
              )}
            </form>
          </div>
        </div>
      );
    }

    /* ============================================================
       BRAIN DUMP VIEW
       ============================================================ */
    function BrainDump({ epics, tasks, onAddEpic, onUpdateEpic, onDeleteEpic }) {
      const [editingEpic, setEditingEpic] = useState(null);
      const count = (epicId) => tasks.filter(t => t.epicId === epicId).length;

      return (
        <div className="view" id="brain-dump-view">
          <div className="view-header">
            <h1 className="view-title">EPICS</h1>
            <span className="view-count">{epics.length} epics</span>
          </div>
          {epics.length === 0 && (
            <div className="empty-state">
              <p className="empty-state__title">NO EPICS YET</p>
              <p className="empty-state__sub">Add your first epic to start organising work into themes.</p>
            </div>
          )}
          <div className="epic-list">
            {epics.map(ep => <EpicCard key={ep.id} epic={ep} taskCount={count(ep.id)} onClick={setEditingEpic} />)}
          </div>
          <button className="fab" onClick={() => setEditingEpic('new')} id="add-epic-fab" aria-label="Add Epic">+</button>
          {editingEpic && (
            <AddEpicModal
              editItem={editingEpic !== 'new' ? editingEpic : null}
              onClose={() => setEditingEpic(null)}
              onSave={(name, colorHex) => {
                if (editingEpic === 'new') onAddEpic(name, colorHex);
                else onUpdateEpic(editingEpic.id, name, colorHex);
              }}
              onDelete={editingEpic !== 'new' ? () => { onDeleteEpic(editingEpic.id); setEditingEpic(null); } : null}
            />
          )}
        </div>
      );
    }

    /* ============================================================
       TASK CARD
       ============================================================ */
    const STATUS_NEXT  = { TO_BE_PICKED: 'WIP', WIP: 'DONE', DONE: null };
    const STATUS_LABEL = { TO_BE_PICKED: 'TO PICK', WIP: 'WIP', DONE: 'DONE' };
    const PILL_CLASS   = { TO_BE_PICKED: 'pill-to-be-picked', WIP: 'pill-wip', DONE: 'pill-done' };

    function TaskCard({ task, epic, onStatusChange, onClick }) {
      const next = STATUS_NEXT[task.status];
      const done = task.status === 'DONE';
      const wip = task.status === 'WIP';
      return (
        <div 
          className={`task-card${done ? ' done' : ''}${wip ? ' wip' : ''}`} 
          role="button" 
          tabIndex="0" 
          id={`task-${task.id}`} 
          onClick={() => onClick(task)}
          style={{ borderLeftColor: epic ? epic.colorHex : 'transparent' }}
        >
          <div className="task-card__header">
            <span className="task-epic-name">{epic?.name ?? 'No Epic'}</span>
            <span className={`task-status-pill ${PILL_CLASS[task.status]}`}>{STATUS_LABEL[task.status]}</span>
          </div>
          <p className={`task-title${done ? ' done' : ''}`}>{task.title}</p>
          <p className="task-dod"><span className="task-dod-label">DOD —</span> {task.definitionOfDone}</p>
          {task.dateStarted && (
            <p className="task-date">
              STARTED {new Date(task.dateStarted).toLocaleString('en-GB', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' })}
            </p>
          )}
          {next && (
            <div
              role="button"
              tabIndex="0"
              className="task-advance-btn"
              onClick={(e) => { e.stopPropagation(); onStatusChange(task.id, next); }}
              id={`advance-${task.id}`}
            >
              MOVE TO {STATUS_LABEL[next]} →
            </div>
          )}
        </div>
      );
    }

    /* ============================================================
       KANBAN COLUMN
       ============================================================ */
    const COL_LABEL = {
      TO_BE_PICKED: 'TO BE PICKED',
      WIP:          'IN PROGRESS',
      DONE:         'DONE',
    };

    function KanbanColumn({ status, tasks, epics, onStatusChange }) {
      const full = status === 'WIP' && tasks.length >= WIP_LIMIT;
      return (
        <div className={`kanban-col${full ? ' is-full' : ''}`} id={`col-${status.toLowerCase().replace('_','-')}`}>
          <div className="kanban-col__header">
            <span className="kanban-col__label">{COL_LABEL[status]}</span>
            <span className="kanban-col__count">{tasks.length}{status === 'WIP' ? `/${WIP_LIMIT}` : ''}</span>
            {full && <span className="kanban-full-badge">FULL</span>}
          </div>
          {tasks.length === 0 && <div className="kanban-empty">NO TASKS</div>}
          <div className="task-list">
            {tasks.map(t => (
              <TaskCard
                key={t.id}
                task={t}
                epic={epics.find(e => e.id === t.epicId)}
                onStatusChange={onStatusChange}
                onClick={onStatusChange.onEditTask}
              />
            ))}
          </div>
        </div>
      );
    }

    /* ============================================================
       ADD/EDIT TASK MODAL
       ============================================================ */
    function AddTaskModal({ epics, editItem, onClose, onSave, onDelete }) {
      const [title, setTitle]   = useState(editItem ? editItem.title : '');
      const [dod, setDod]       = useState(editItem ? editItem.definitionOfDone : '');
      const [epicId, setEpicId] = useState(editItem ? editItem.epicId : epics[0]?.id ?? '');
      const [errors, setErrors] = useState({});

      const validate = () => {
        const e = {};
        if (!title.trim())  e.title = 'Task title is required.';
        if (!dod.trim())    e.dod   = 'Definition of Done is mandatory.';
        if (!epicId)        e.epic  = 'Please select an epic.';
        return e;
      };

      const submit = (e) => {
        e.preventDefault();
        const errs = validate();
        if (Object.keys(errs).length) { setErrors(errs); return; }
        onSave(epicId, title.trim(), dod.trim());
        onClose();
      };

      const clr = (field) => setErrors(p => ({ ...p, [field]: '' }));

      return (
        <div className="modal-overlay" onClick={onClose} id="add-task-modal">
          <div className="modal-sheet" onClick={e => e.stopPropagation()}>
            <div className="modal-header">
              <span className="modal-tag">{editItem ? 'EDIT TASK' : 'NEW TASK'}</span>
              <button className="modal-close" onClick={onClose} aria-label="Close">✕</button>
            </div>
            <p className="modal-subtitle">Tasks without concrete DoD will be flagged for review.</p>
            <form onSubmit={submit} className="modal-form">
              <label className="field-label">TASK TITLE</label>
              <input
                autoFocus
                className={`field-input${errors.title ? ' error' : ''}`}
                type="text"
                placeholder="e.g. Refactor state hydration"
                value={title}
                id="task-title-input"
                onChange={e => { setTitle(e.target.value); clr('title'); }}
              />
              {errors.title && <span className="field-error">{errors.title}</span>}

              <label className="field-label field-mt">DEFINITION OF DONE</label>
              <textarea
                className={`field-input${errors.dod ? ' error' : ''}`}
                placeholder="e.g. Zero latency re-render, unit tests passing"
                value={dod}
                rows={3}
                id="task-dod-input"
                onChange={e => { setDod(e.target.value); clr('dod'); }}
              />
              {errors.dod && <span className="field-error">{errors.dod}</span>}

              <label className="field-label field-mt">EPIC</label>
              {epics.length === 0
                ? <p className="field-error">No epics yet — add an epic first from Brain Dump.</p>
                : (
                  <select
                    className={`field-input${errors.epic ? ' error' : ''}`}
                    value={epicId}
                    id="task-epic-select"
                    onChange={e => { setEpicId(e.target.value); clr('epic'); }}
                  >
                    {epics.map(ep => <option key={ep.id} value={ep.id}>{ep.name}</option>)}
                  </select>
                )
              }
              {errors.epic && <span className="field-error">{errors.epic}</span>}

              <button
                type="submit"
                className="btn-primary"
                disabled={epics.length === 0}
                id="add-task-submit"
              >
                {editItem ? 'SAVE CHANGES' : 'ADD TASK'}
              </button>
              {editItem && (
                <button
                  type="button"
                  className="btn-danger"
                  onClick={onDelete}
                  id="delete-task-submit"
                >
                  DELETE TASK
                </button>
              )}
            </form>
          </div>
        </div>
      );
    }

    /* ============================================================
       ACTION BOARD VIEW
       ============================================================ */
    const STATUSES = ['TO_BE_PICKED', 'WIP', 'DONE'];

    function ActionBoard({ tasks, epics, onStatusChange, onAddTask, onUpdateTask, onDeleteTask }) {
      const [editingTask, setEditingTask] = useState(null);
      // We pass the edit click handler down via the onStatusChange object to avoid prop drilling through KanbanColumn
      onStatusChange.onEditTask = setEditingTask;
      
      return (
        <div className="view" id="action-board-view">
          <div className="view-header">
            <h1 className="view-title">ACTION BOARD</h1>
            <span className="view-count">{tasks.length} tasks</span>
          </div>
          <div className="kanban-board">
            {STATUSES.map(s => (
              <KanbanColumn
                key={s}
                status={s}
                tasks={tasks.filter(t => t.status === s)}
                epics={epics}
                onStatusChange={onStatusChange}
              />
            ))}
          </div>
          <button className="fab" onClick={() => setEditingTask('new')} id="add-task-fab" aria-label="Add Task">+</button>
          {editingTask && (
            <AddTaskModal 
              epics={epics} 
              editItem={editingTask !== 'new' ? editingTask : null}
              onClose={() => setEditingTask(null)} 
              onSave={(epicId, title, dod) => {
                if (editingTask === 'new') onAddTask(epicId, title, dod);
                else onUpdateTask(editingTask.id, epicId, title, dod);
              }}
              onDelete={editingTask !== 'new' ? () => { onDeleteTask(editingTask.id); setEditingTask(null); } : null}
            />
          )}
        </div>
      );
    }

    /* ============================================================
       AUTH OVERLAY
       ============================================================ */
    const AuthOverlay = ({ onLogin }) => {
      const [pass, setPass] = React.useState('');
      const [err, setErr] = React.useState('');

      const submit = (e) => {
        e.preventDefault();
        onLogin(pass).catch((e) => setErr(e.message));
      };

      return (
        <div className="modal-overlay" style={{ zIndex: 100, backgroundColor: 'var(--bg)' }}>
          <div className="modal-sheet" style={{ maxWidth: '400px', transform: 'none' }}>
            <div className="modal-header">
              <span className="modal-tag">SECURE ACCESS</span>
            </div>
            <p className="modal-subtitle">48H Project — Restricted to Master User</p>
            <form onSubmit={submit} className="modal-form">
              <label className="field-label">MASTER PASSWORD</label>
              <input
                autoFocus
                type="password"
                className={`field-input${err ? ' error' : ''}`}
                value={pass}
                onChange={e => { setPass(e.target.value); setErr(''); }}
                placeholder="••••••••"
              />
              {err && <p className="field-error">{err}</p>}
              <button type="submit" className="btn-primary" style={{ marginTop: '2rem' }}>UNLOCK APP</button>
            </form>
          </div>
        </div>
      );
    };

    /* ============================================================
       APP ROOT
       ============================================================ */
    function App() {
      const [activeTab, setActiveTab] = React.useState('brain-dump');
      const [epics, setEpics] = React.useState([]);
      const [tasks, setTasks] = React.useState([]);
      const [wipBlocked, setWipBlocked] = React.useState(false);
      const [isAuthenticated, setIsAuthenticated] = React.useState(false);
      const [masterPass, setMasterPass] = React.useState(localStorage.getItem('48h_master_pass') || '');
      const [isSyncing, setIsSyncing] = React.useState(false);

      // --- Cloud Sync ---
      const syncToCloud = async (currentEpics, currentTasks) => {
        if (!masterPass) return;
        setIsSyncing(true);
        try {
          await fetch('/api/sync', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': masterPass
            },
            body: JSON.stringify({ epics: currentEpics, tasks: currentTasks })
          });
        } catch (e) { console.error('Sync failed', e); }
        finally { setIsSyncing(false); }
      };

      // Debounced sync
      const syncTimeout = React.useRef(null);
      React.useEffect(() => {
        if (!isAuthenticated) return;
        if (syncTimeout.current) clearTimeout(syncTimeout.current);
        syncTimeout.current = setTimeout(() => {
          syncToCloud(epics, tasks);
        }, 1500);
      }, [epics, tasks]);

      const handleLogin = async (password) => {
        try {
          const res = await fetch('/api/sync', {
            headers: { 'Authorization': password }
          });
          
          if (!res.ok) {
            const errorData = await res.json();
            throw new Error(errorData.error || 'Access Denied');
          }

          const data = await res.json();
          setMasterPass(password);
          localStorage.setItem('48h_master_pass', password);
          
          // Migration check: If cloud is empty but local has data, seed cloud
          const localEpics = JSON.parse(localStorage.getItem('epics_48h') || '[]');
          const localTasks = JSON.parse(localStorage.getItem('tasks_48h') || '[]');
          
          if (data.epics.length === 0 && localEpics.length > 0) {
            setEpics(localEpics);
            setTasks(localTasks);
            await syncToCloud(localEpics, localTasks);
          } else {
            setEpics(data.epics);
            setTasks(data.tasks);
          }
          
          setIsAuthenticated(true);
        } else {
          throw new Error('Invalid');
        }
      };

      // Auto-login if we have a saved pass
      React.useEffect(() => {
        if (masterPass) handleLogin(masterPass).catch(() => setMasterPass(''));
      }, []);

      if (!isAuthenticated) return <AuthOverlay onLogin={handleLogin} />;

      const handleAddEpic = (name, colorHex) => setEpics([...epics, createEpic(name, colorHex)]);

      const handleUpdateEpic = (id, name, colorHex) => setEpics(epics.map(e => e.id === id ? { ...e, name, colorHex } : e));

      const handleDeleteEpic = (id) => {
        setEpics(epics.filter(e => e.id !== id));
        setTasks(tasks.filter(t => t.epicId !== id)); // Cascade delete tasks
      };

      const handleAddTask = (epicId, title, dod) => setTasks([...tasks, createTask(epicId, title, dod)]);

      const handleUpdateTask = (id, epicId, title, definitionOfDone) => 
        setTasks(tasks.map(t => t.id === id ? { ...t, epicId, title, definitionOfDone } : t));

      const handleDeleteTask = (id) => setTasks(tasks.filter(t => t.id !== id));

      const handleStatusChange = (taskId, newStatus) => {
        try {
          setTasks(moveTaskStatus(tasks, taskId, newStatus));
        } catch (err) {
          if (err instanceof WipLimitError) {
            setWipBlocked(true);
            setTimeout(() => setWipBlocked(false), 650);
          }
        }
      };

      return (
        <div className="app-root">
          <StatusTicker tasks={tasks} isSyncing={isSyncing} />
          <main className="main-content">
            {activeTab === 'brain-dump' && (
              <BrainDump 
                epics={epics} 
                tasks={tasks} 
                onAddEpic={handleAddEpic} 
                onUpdateEpic={handleUpdateEpic}
                onDeleteEpic={handleDeleteEpic}
              />
            )}
            {tab === 'action-board' && (
              <ActionBoard
                tasks={tasks}
                epics={epics}
                onStatusChange={handleStatusChange}
                onAddTask={handleAddTask}
                onUpdateTask={handleUpdateTask}
                onDeleteTask={handleDeleteTask}
              />
            )}
          </main>
          <WipBlocker visible={wipBlocked} />
          <BottomNav active={tab} onChange={setTab} />
        </div>
      );
    }

    /* ============================================================
       MOUNT
       ============================================================ */
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('Service Worker registered', reg))
          .catch(err => console.error('Service Worker registration failed', err));
      });
    }
  </script>
</body>
</html>
